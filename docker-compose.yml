services:
  api:
    image: taskpi:latest
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    command: ["node", "apps/api/dist/index.js"]
    environment:
      NODE_ENV: production
      API_PORT: "3001"
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:?INTERNAL_API_KEY is required}
      MINIAPP_CONTEXT_SECRET: ${MINIAPP_CONTEXT_SECRET:?MINIAPP_CONTEXT_SECRET is required}
      # Path inside the container (host dir is bind-mounted at /app/data)
      DATABASE_URL: ${DATABASE_URL:-/app/data/app.db}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/ready"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    volumes:
      # Host directory (default ./data). Override with SQLITE_HOST_PATH on the VPS.
      - ${SQLITE_HOST_PATH:-./data}:/app/data
    networks:
      - internal

  miniapp:
    image: taskpi:latest
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    command: ["node", "apps/miniapp/dist/index.js"]
    environment:
      NODE_ENV: production
      MINIAPP_PORT: "3002"
      API_BASE_URL: http://api:3001
      BOT_TOKEN: ${BOT_TOKEN:?BOT_TOKEN is required}
      MINIAPP_CONTEXT_SECRET: ${MINIAPP_CONTEXT_SECRET:?MINIAPP_CONTEXT_SECRET is required}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3002/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      api:
        condition: service_healthy
    networks:
      - internal

  bot:
    image: taskpi:latest
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    command: ["node", "apps/bot/dist/index.js"]
    environment:
      NODE_ENV: production
      BOT_TOKEN: ${BOT_TOKEN:?BOT_TOKEN is required}
      BOT_UPDATE_MODE: webhook
      BOT_WEBHOOK_SECRET: ${BOT_WEBHOOK_SECRET:?BOT_WEBHOOK_SECRET is required}
      BOT_WEBHOOK_URL: ${BOT_WEBHOOK_URL:?BOT_WEBHOOK_URL is required}
      BOT_PORT: "3000"
      API_BASE_URL: http://api:3001
      MINIAPP_BASE_URL: ${MINIAPP_BASE_URL:?MINIAPP_BASE_URL is required}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:?INTERNAL_API_KEY is required}
      MINIAPP_CONTEXT_SECRET: ${MINIAPP_CONTEXT_SECRET:?MINIAPP_CONTEXT_SECRET is required}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      api:
        condition: service_healthy
    networks:
      - internal

networks:
  internal:
